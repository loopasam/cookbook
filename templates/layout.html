<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4 portrait;
    margin: 8mm;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 8pt;
    color: #000;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    width: 194mm;
    height: 281mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    page-break-after: always;
  }

  .page:last-child {
    page-break-after: avoid;
  }


  .card {
    padding: 4mm;
    overflow: hidden;
    border: 1px solid #ccc;
  }

  .card h1 {
    font-size: 12pt;
    margin-bottom: 2mm;
  }

  .card .servings {
    font-size: 7pt;
    color: #555;
    margin-bottom: 2mm;
  }

  .card h2 {
    font-size: 8.5pt;
    margin-top: 2mm;
    margin-bottom: 1mm;
  }

  .card ul, .card ol {
    padding-left: 4mm;
    margin-bottom: 1mm;
  }

  .card li {
    margin-bottom: 0.5mm;
    line-height: 1.3;
  }

  .card ul {
    list-style: none;
    padding-left: 0;
  }

  .card ul li::before {
    content: none;
  }

  .card .notes {
    font-style: italic;
    font-size: 7pt;
    color: #444;
  }

  /* Auto-expand: half-page card */
  .card.half {
    grid-column: span 2;
  }

  /* Auto-expand: full-page card */
  .card.full {
    grid-column: span 2;
    grid-row: span 2;
  }
</style>
</head>
<body>
{{CARDS}}
</body>
</html>
