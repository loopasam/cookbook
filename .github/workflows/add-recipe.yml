name: Add Recipe from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  add-recipe:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install pi coding agent
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Run pi agent to process recipe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          pi --provider anthropic --model claude-opus-4-6 --no-session --print \
            "You are a recipe assistant for this cookbook project.

          Read the AGENTS.md file for the recipe format conventions.

          A user submitted a GitHub Issue with the following content:

          **Title:** $ISSUE_TITLE

          **Body:**
          $ISSUE_BODY

          Your task:
          1. Follow the AGENTS.md conventions exactly to create a new markdown file in recipes/ based on the issue content. Pick the right category, add emoji markers, keep it concise.
          2. After creating the recipe file, run: npm run build
          3. Verify the build succeeded."

      - name: Commit and push recipe
        id: commit
        run: |
          git add -A
          RECIPE_FILE=$(git diff --cached --name-only | grep '^recipes/' | head -1)
          if [ -n "$RECIPE_FILE" ]; then
            echo "recipe_file=$RECIPE_FILE" >> "$GITHUB_OUTPUT"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Add recipe from issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
            git push
          fi

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.recipe_file
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Publish Pages
        id: deploy
        if: steps.commit.outputs.recipe_file
        uses: actions/deploy-pages@v4

      - name: Close issue with success comment
        if: steps.commit.outputs.recipe_file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG=$(basename "${{ steps.commit.outputs.recipe_file }}" .md)
          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ Recipe added! It will be live shortly at https://loopasam.github.io/cookbook/${SLUG}.html"
          gh issue close ${{ github.event.issue.number }}
